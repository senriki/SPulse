name: Build Release (reusable)

# Shared by release.yml (stable) and release-rc.yml (release candidate).
# Called with prerelease: true/false so both pipelines build identically
# and only differ in how the GitHub Release gets flagged.
on:
  workflow_call:
    inputs:
      prerelease:
        description: 'Mark the GitHub Release as a pre-release'
        type: boolean
        required: true

jobs:
  # Step 1: create the GitHub release once before any build starts
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # needed to access full tag history

      - name: Generate changelog
        id: changelog
        run: |
          python3 - <<'PYEOF'
          import subprocess, os, re
          from datetime import date

          curr = subprocess.getoutput("git describe --tags --exact-match HEAD 2>/dev/null").strip()
          prev = subprocess.getoutput(
              f"git tag --sort=-v:refname | grep -v '^{curr}$' | head -1"
          ).strip()
          range_arg = f"{prev}..HEAD" if prev else "HEAD"
          raw = subprocess.getoutput(f"git log --pretty=format:%s {range_arg}").splitlines()

          cats = {"Features": [], "Bug Fixes": [], "Improvements": [], "Other Changes": []}
          skip = re.compile(r"^(bump version|docs)", re.I)
          feat = re.compile(r"^add ", re.I)
          fix  = re.compile(r"^fix ", re.I)
          impr = re.compile(r"^(update|improve|refactor) ", re.I)

          for line in raw:
              if not line.strip() or skip.match(line): continue
              if feat.match(line):   cats["Features"].append(line)
              elif fix.match(line):  cats["Bug Fixes"].append(line)
              elif impr.match(line): cats["Improvements"].append(line)
              else:                  cats["Other Changes"].append(line)

          today = date.today().isoformat()
          sections = [f"## {curr} — {today}\n"]
          for title, items in cats.items():
              if items:
                  sections.append(f"### {title}")
                  sections.extend(f"- {i}" for i in items)
                  sections.append("")

          body = "\n".join(sections)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"body<<BODYEOF\n{body}\nBODYEOF\n")
          PYEOF

      - name: Create release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ inputs.prerelease }}
          body: ${{ steps.changelog.outputs.body }}

  # Step 2: build on each OS and upload artifacts to the release
  build:
    name: Build & upload — ${{ matrix.os }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win
          - os: macos-latest
            args: --mac
          - os: ubuntu-latest
            args: --linux

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: node scripts/gen-icon.js ${{ inputs.prerelease && '--channel=rc' || '' }}

      - name: Build & upload to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.args }} --publish always
