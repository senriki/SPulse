stages:
  - build

# ── Linux AppImage ─────────────────────────────────────────────────────────────
build-linux:
  stage: build
  image: node:18-bullseye
  tags:
    - saas-linux-medium-amd64
  cache:
    key: waveexport-linux-$CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run build:linux
  artifacts:
    name: "waveexport-linux-$CI_COMMIT_SHORT_SHA"
    paths:
      - dist/*.AppImage
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ── Windows NSIS installer ─────────────────────────────────────────────────────
build-windows:
  stage: build
  tags:
    - saas-windows-medium-amd64
  cache:
    key: waveexport-windows-$CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run build:win
  artifacts:
    name: "waveexport-windows-$CI_COMMIT_SHORT_SHA"
    paths:
      - dist/*.exe
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
